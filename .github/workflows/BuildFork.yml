name: Build ViolentMonkey Fork

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create / update GitHub release'
        required: false
        default: false
        type: boolean

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 100
          fetch-tags: true

      - name: Apply patches
        run: python3 apply_patches_addmatch.py

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - name: Install
        run: pnpm i
      - name: Test
        run: pnpm run ci
      - name: Build
        env:
          SYNC_DROPBOX_CLIENT_ID: ${{ secrets.SYNC_DROPBOX_CLIENT_ID }}
          SYNC_GOOGLE_DESKTOP_ID: ${{ secrets.SYNC_GOOGLE_DESKTOP_ID }}
          SYNC_GOOGLE_DESKTOP_SECRET: ${{ secrets.SYNC_GOOGLE_DESKTOP_SECRET }}
          SYNC_ONEDRIVE_CLIENT_ID: ${{ secrets.SYNC_ONEDRIVE_CLIENT_ID }}
        run: pnpm build

      - name: Get version and SHA
        run: node scripts/action-helper.js ci

      - name: Resolve artifact name
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BETA=$(node -p "require('./package.json').beta || ''")
          MM=$(echo "$VERSION" | cut -d. -f1,2)
          echo "PKG_VERSION=${VERSION}" >> $GITHUB_ENV
          if [ -n "$BETA" ]; then
            DISPLAY_VERSION="${MM}.${BETA}"
            echo "ARTIFACT_NAME=ViolentMonkey_AddDomain-V${DISPLAY_VERSION}-Beta-Unsigned" >> $GITHUB_ENV
            echo "RELEASE_TAG=V${DISPLAY_VERSION}-Beta"                                     >> $GITHUB_ENV
            echo "RELEASE_NAME=ViolentMonkey AddDomain V${DISPLAY_VERSION} (Beta)"          >> $GITHUB_ENV
            echo "IS_BETA=true"                                                             >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=ViolentMonkey_AddDomain-V${VERSION}-Unsigned" >> $GITHUB_ENV
            echo "RELEASE_TAG=V${VERSION}"                                    >> $GITHUB_ENV
            echo "RELEASE_NAME=ViolentMonkey AddDomain V${VERSION}"           >> $GITHUB_ENV
            echo "IS_BETA=false"                                              >> $GITHUB_ENV
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: '${{ env.ARTIFACT_NAME }}'
          path: 'dist/*'
          if-no-files-found: error

      - name: Package dist as ZIP
        run: cd dist && zip -r "../$ARTIFACT_NAME.zip" . && cd ..

      - name: Create / Update Release
        if: inputs.create_release == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          [ "$IS_BETA" = "true" ] && PRERELEASE_FLAG="--prerelease"

          NOTES="Patched Violentmonkey build — Add domain to \`@match\` feature.
          Based on upstream Violentmonkey v${PKG_VERSION}.

          What's included:
          - Popup + button to add current tab domain to a script's \`@match\`
          - Dashboard domain-add panel with Current tab pre-fill
          - Shorthand expansion on save (example.com,xyz.* to full \`@match\` lines)
          - anyTld wildcard TLD support
          - No Code Minification

          By @BlazeFTL"

          # Remove stale release+tag if they exist
          gh release delete "$RELEASE_TAG" --cleanup-tag --yes 2>/dev/null || true

          # Create fresh release with ZIP asset
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes "$NOTES" \
            $PRERELEASE_FLAG \
            "$ARTIFACT_NAME.zip"
